services:
  # NodeJS Service
  app-assurmoi-node:
    container_name: "app-assurmoi-API-nodejs"
    build:
      context: ./
      dockerfile: Dockerfile
    command:
      - /bin/sh
      - -lc
      - npm run migrate && npm run seed && npm run dev
    depends_on:
      app-assurmoi-db:
        condition: service_healthy
      app-assurmoi-mailhog:
        condition: service_started
    links:
      - "app-assurmoi-db:db"
      - "app-assurmoi-mailhog:mailhog"
    environment:
      - NODE_ENV=development
    volumes:
      - "./:/home/app:rw"
    ports:
      - "3000:3000"
    networks:
      - default
    expose:
      - "3000"
    working_dir: "/home/app/assurmoi"
  # SMTP server
  app-assurmoi-mailhog:
    image: mailhog/mailhog
    ports:
      - 1025:1025 # smtp server
      - 8025:8025 # web ui
  # database
  app-assurmoi-db:
    image: mariadb
    restart: always
    environment:
      MARIADB_ROOT_PASSWORD: root
      MARIADB_DATABASE: assurmoidb
    healthcheck:
      test:
        ["CMD", "mariadb-admin", "ping", "-h", "127.0.0.1", "-uroot", "-proot"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s
    volumes:
      - "./db-data:/var/lib/mysql:rw"
  # Database client
  app-assurmoi-adminer:
    image: adminer
    restart: always
    ports:
      - 8080:8080

  # react native environment
  app-assurmoi-app:
    container_name: "app-assurmoi-reactnative"
    build:
      context: ./
      dockerfile: Dockerfile.front
    command:
      - /bin/sh
      - -lc
      - REACT_NATIVE_PACKAGER_HOSTNAME=${EXPO_PACKAGER_HOSTNAME:-192.168.1.42} npm run start:lan
    environment:
      - NODE_ENV=development
      - EXPO_PUBLIC_API_BASE_URL=${EXPO_PUBLIC_API_BASE_URL:-http://192.168.1.42:3000/api}
    ports:
      - 8081:8081
      - 19000:19000
      - 19001:19001
      - 19002:19002
    stdin_open: true
    tty: true
    volumes:
      - "./assurmobile:/home/app"
    working_dir: "/home/app/my-app"
    extra_hosts:
      - "host.docker.internal:host-gateway"
